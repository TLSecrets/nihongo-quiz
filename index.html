<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学日本語Ⅲ — 期末復習クイズ</title>
<style>
  :root {
    --bg: #faf8f3; --paper: #fefef9; --ink: #1a1a2e; --ink-light: #5a5a6e;
    --divider: #d4cfc4; --radius: 12px;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --mod-read: #c13b2a; --mod-read-bg: #faf3f2;
    --mod-kanji: #2d4a7a; --mod-kanji-bg: #f2f4f8;
    --mod-gairaigo: #2d6e3a; --mod-gairaigo-bg: #f2f7f3;
    --mod-grammar: #8b6e2e; --mod-grammar-bg: #faf7f0;
    --mod-combi: #5a3a7a; --mod-combi-bg: #f5f2f8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--ink);
    font-family: 'Noto Sans JP', 'Yu Gothic', 'Microsoft YaHei', sans-serif;
    line-height: 1.8; min-height: 100vh; transition: background 0.5s;
  }
  body.mode-read { background: var(--mod-read-bg); }
  body.mode-kanji { background: var(--mod-kanji-bg); }
  body.mode-gairaigo { background: var(--mod-gairaigo-bg); }
  body.mode-grammar { background: var(--mod-grammar-bg); }
  body.mode-combi { background: var(--mod-combi-bg); }
  .top-bar {
    position: sticky; top:0; z-index:200;
    background: rgba(254,254,249,0.9);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--divider);
    padding:0 24px; height:56px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .top-bar .brand {
    font-family: 'Yu Mincho', serif;
    font-size:1.05rem; font-weight:700; color: #2d3a6e;
  }
  .progress-pill { display:flex; align-items:center; gap:10px; font-size:0.85rem; color:var(--ink-light); }
  .progress-bar-outer { width:100px; height:6px; background:#e8e4d8; border-radius:10px; overflow:hidden; }
  .progress-bar-inner { height:100%; border-radius:10px; transition: width 0.5s; }
  .tab-nav {
    position: sticky; top:56px; z-index:199;
    background: rgba(254,254,249,0.88); backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--divider);
    display:flex; justify-content:center; padding:0 8px; overflow-x:auto;
  }
  .tab-btn {
    padding:10px 16px; border:none; background:transparent; cursor:pointer;
    font-size:0.82rem; font-weight:600; color: var(--ink-light);
    border-bottom: 3px solid transparent; transition: all var(--transition); white-space:nowrap;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn[data-mod="read"].active { border-bottom-color: var(--mod-read); color: var(--mod-read); }
  .tab-btn[data-mod="kanji"].active { border-bottom-color: var(--mod-kanji); color: var(--mod-kanji); }
  .tab-btn[data-mod="gairaigo"].active { border-bottom-color: var(--mod-gairaigo); color: var(--mod-gairaigo); }
  .tab-btn[data-mod="grammar"].active { border-bottom-color: var(--mod-grammar); color: var(--mod-grammar); }
  .tab-btn[data-mod="combi"].active { border-bottom-color: var(--mod-combi); color: var(--mod-combi); }

  #countPanelContainer {
    max-width:860px;
    margin:0 auto;
    padding:12px 16px 0;
  }
  .count-set-panel {
    background: var(--paper);
    border:1px solid var(--divider);
    border-radius: var(--radius);
    padding:14px 18px;
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
  }
  .count-set-panel .title {
    width:100%;
    font-size:0.85rem;
    color:var(--ink-light);
    font-weight:600;
  }
  .count-item {
    display:flex;
    align-items:center;
    gap:6px;
  }
  .count-item label {
    font-size:0.8rem;
  }
  .count-item input {
    width:54px;
    padding:6px 4px;
    border:1px solid var(--divider);
    border-radius:6px;
    text-align:center;
  }
  .apply-count-btn {
    padding:6px 14px;
    background:#2d3a7a;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:0.8rem;
  }

  .main-container {
    max-width:860px;
    margin:0 auto;
    padding:12px 16px 80px;
  }

  .module-panel { display:none; }
  .module-panel.show { display:block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
  .m-header { text-align:center; margin-bottom:32px; }
  .m-header .label {
    display:inline-block; font-size:0.72rem; letter-spacing:0.14em;
    font-weight:600; padding:4px 14px; border-radius:20px; margin-bottom:12px;
  }
  .m-read .label { color:var(--mod-read); border:1px solid rgba(193,59,42,0.3); }
  .m-kanji .label { color:var(--mod-kanji); border:1px solid rgba(45,74,122,0.3); }
  .m-gairaigo .label { color:var(--mod-gairaigo); border:1px solid rgba(45,110,58,0.3); }
  .m-grammar .label { color:var(--mod-grammar); border:1px solid rgba(139,110,46,0.3); }
  .m-combi .label { color:var(--mod-combi); border:1px solid rgba(90,58,122,0.3); }
  .m-header h1 { font-family: 'Yu Mincho', serif; font-size:1.6rem; font-weight:700; line-height:1.5; }
  .m-read .m-header h1 { color:#2d3a6e; }
  .m-kanji .m-header h1 { color:var(--mod-kanji); }
  .m-gairaigo .m-header h1 { color:var(--mod-gairaigo); }
  .m-grammar .m-header h1 { color:var(--mod-grammar); }
  .m-combi .m-header h1 { color:var(--mod-combi); }
  .m-header .subtitle { font-size:0.82rem; color:var(--ink-light); margin-top:4px; }
  .q-card {
    background:var(--paper); border:1px solid var(--divider);
    border-radius:var(--radius); padding:24px 20px; margin-bottom:20px;
    box-shadow:0 2px 12px rgba(0,0,0,0.05); transition: all var(--transition);
  }
  .q-card.correct { border-color:rgba(45,110,74,0.3); background:linear-gradient(135deg,#fefef9,#edf7f0); }
  .q-card.wrong { border-color:rgba(193,59,42,0.25); background:linear-gradient(135deg,#fefef9,#fdf0ed); }
  .q-card.partial { border-color:rgba(139,122,46,0.3); background:linear-gradient(135deg,#fefef9,#fdf9e8); }
  .q-num-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .q-num {
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; border-radius:50%; color:#fff; font-size:0.7rem; font-weight:700;
  }
  .m-read .q-num { background:var(--mod-read); }
  .m-kanji .q-num { background:var(--mod-kanji); }
  .m-gairaigo .q-num { background:var(--mod-gairaigo); }
  .m-grammar .q-num { background:var(--mod-grammar); }
  .m-combi .q-num { background:var(--mod-combi); }
  .q-badge {
    font-size:0.66rem;
    color:var(--ink-light);
    background:#f5f2ea;
    padding:2px 8px;
    border-radius:4px;
    max-width:120px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .q-stem { font-size:1.02rem; font-weight:500; line-height:2; margin-bottom:4px; }
  .q-stem .hl { color:var(--mod-read); border-bottom:2px dashed rgba(193,59,42,0.5); font-weight:700; }
  .m-kanji .q-stem .hl { color:var(--mod-kanji); border-color:rgba(45,74,122,0.5); }
  .m-gairaigo .q-stem .hl { color:var(--mod-gairaigo); border-color:rgba(45,110,58,0.5); }
  .m-grammar .q-stem .hl { color:var(--mod-grammar); border-color:rgba(139,110,46,0.5); }
  .q-prompt { font-size:0.78rem; color:var(--ink-light); margin-bottom:12px; font-style:italic; }
  .opts { display:flex; flex-direction:column; gap:7px; list-style:none; }
  .opt-btn {
    display:flex; align-items:center; gap:10px; width:100%; padding:11px 14px;
    border:1.5px solid var(--divider); border-radius:8px; background:#fefef9;
    cursor:pointer; font-size:0.92rem; text-align:left; transition: all var(--transition);
  }
  .opt-btn:hover:not(:disabled) { border-color:#7a8aae; background:rgba(45,58,110,0.03); transform:translateX(2px); }
  .opt-btn:disabled { cursor:default; }
  .opt-marker {
    display:inline-flex; align-items:center; justify-content:center;
    width:24px; height:24px; border-radius:50%; border:1.5px solid var(--divider);
    font-size:0.68rem; font-weight:700; color:var(--ink-light); flex-shrink:0;
  }
  .opt-btn.correct-pick { border-color:#2d6e4a !important; background:#edf7f0 !important; }
  .opt-btn.correct-pick .opt-marker { background:#2d6e4a; border-color:#2d6e4a; color:#fff; }
  .opt-btn.wrong-pick { border-color:#c13b2a !important; background:#fdf0ed !important; animation:shake 0.4s; }
  .opt-btn.wrong-pick .opt-marker { background:#c13b2a; border-color:#c13b2a; color:#fff; }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-2px)} 80%{transform:translateX(2px)}
  }
  .input-row { display:flex; gap:6px; align-items:center; }
  .answer-input {
    flex:1; padding:9px 12px; border:1.5px solid var(--divider);
    border-radius:8px; font-size:0.92rem; background:#fff; outline:none;
  }
  .answer-input:focus { border-color:var(--mod-gairaigo); box-shadow:0 0 0 3px rgba(45,110,58,0.08); }
  .answer-input:disabled { background:#f8f8f5; }
  .check-btn {
    padding:9px 14px; background:var(--mod-gairaigo); color:#fff; border:none;
    border-radius:8px; cursor:pointer; font-size:0.8rem; font-weight:600; white-space:nowrap;
  }
  .check-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .feedback { margin-top:8px; font-size:0.8rem; font-weight:600; }
  .feedback.ok { color:#2d6e4a; }
  .feedback.ng { color:#c13b2a; }
  .score-summary { position:sticky; bottom:14px; z-index:90; max-width:860px; margin:0 auto; padding:0 16px; }
  .score-bar {
    background:var(--paper); border:1px solid var(--divider); border-radius:var(--radius);
    padding:12px 20px; display:flex; align-items:center; justify-content:space-between;
    box-shadow:0 4px 18px rgba(0,0,0,0.10); flex-wrap:wrap; gap:8px;
  }
  .score-bar .st { font-weight:700; font-size:0.95rem; }
  .score-bar .sv { font-weight:800; font-size:1.15rem; }
  .reset-btn-group {
    display:flex;
    gap:8px;
  }
  .reset-btn {
    padding:7px 12px; border:1.5px solid var(--ink-light); background:transparent;
    border-radius:8px; cursor:pointer; font-size:0.75rem; font-weight:600;
  }
  .reset-btn.full {
    border-color:#c13b2a;
    color:#c13b2a;
  }
  .reset-btn.partial {
    border-color:#2d4a7a;
    color:#2d4a7a;
  }
  .reset-btn:hover { background:var(--ink); color:#fff; border-color:var(--ink); }
  .result-panel { text-align:center; padding:36px 16px; display:none; }
  .result-panel.show { display:block; }
  .result-panel .big-score { font-family:'Yu Mincho',serif; font-size:3.2rem; font-weight:900; }
  .result-panel .big-score span { font-size:1.6rem; opacity:0.6; }
  .result-panel .grade { font-size:0.95rem; color:var(--ink-light); margin:6px 0 18px; }
  .result-panel .review-btn {
    display:inline-block; padding:10px 24px; background:#2d3a6e; color:#fff;
    border:none; border-radius:10px; cursor:pointer; font-size:0.85rem; font-weight:600;
  }
  .gai-quick-bar {
    display:flex; align-items:center; gap:8px; padding:8px 14px; margin-bottom:18px;
    background:rgba(253,254,251,0.92); backdrop-filter:blur(10px);
    border:1px solid var(--divider); border-radius:10px; flex-wrap:wrap;
  }
  .gai-quick-bar .submit-all-btn {
    padding:7px 16px; background:var(--mod-gairaigo); color:#fff; border:none;
    border-radius:8px; cursor:pointer; font-weight:600; font-size:0.82rem;
  }
  .gai-quick-bar .reveal-all-btn {
    padding:7px 16px; background:transparent; border:1.5px solid var(--divider);
    border-radius:8px; cursor:pointer; color:var(--ink-light); font-size:0.82rem;
  }
  .gai-quick-score { margin-left:auto; font-weight:600; color:var(--mod-gairaigo); }
  .footer { text-align:center; padding:28px 16px; font-size:0.7rem; color:#bfb9a8; }
  @media (max-width:600px) {
    .tab-btn { padding:8px 10px; font-size:0.72rem; }
    .q-card { padding:16px 12px; }
    .q-stem { font-size:0.92rem; }
    .opt-btn { padding:9px 10px; font-size:0.87rem; }
    .score-bar { justify-content:center; }
    .reset-btn-group { width:100%; justify-content:center; }
  }
  .random-toggle {
    display:flex;
    align-items:center;
    gap:6px;
    font-size:0.85rem;
    color:var(--ink-light);
  }
  .random-toggle input[type="checkbox"] {
    width:18px;
    height:18px;
    accent-color:#2d3a7a;
    cursor:pointer;
  }
</style>
</head>
<body>
<div class="top-bar">
  <div class="brand">大学日本語<span style="color:var(--mod-read)">Ⅲ</span> · 期末復習クイズ</div>
  <div class="progress-pill">
    <span id="progText">0 / 0</span>
    <div class="progress-bar-outer"><div class="progress-bar-inner" id="progBar" style="width:0%"></div></div>
  </div>
</div>
<nav class="tab-nav" id="tabNav">
  <button class="tab-btn active" data-mod="read" onclick="switchModule('read')">📖 単語読み方</button>
  <button class="tab-btn" data-mod="kanji" onclick="switchModule('kanji')">✍️ 漢字書き取り</button>
  <button class="tab-btn" data-mod="gairaigo" onclick="switchModule('gairaigo')">🌐 外来語翻訳</button>
  <button class="tab-btn" data-mod="grammar" onclick="switchModule('grammar')">📝 文法選択</button>
  <button class="tab-btn" data-mod="combi" onclick="switchModule('combi')">🧩 総合テスト</button>
</nav>

<!-- 题量设置面板 -->
<div id="countPanelContainer">
  <div class="count-set-panel">
    <div class="title">各モジュール出題数設定（総合テストにも反映）</div>
    <div class="count-item">
      <label>単語読み</label>
      <input type="number" id="cntRead" min="1" max="63" value="15">
    </div>
    <div class="count-item">
      <label>漢字</label>
      <input type="number" id="cntKanji" min="1" max="55" value="10">
    </div>
    <div class="count-item">
      <label>外来語</label>
      <input type="number" id="cntGai" min="1" max="65" value="10">
    </div>
    <div class="count-item">
      <label>文法</label>
      <input type="number" id="cntGram" min="1" max="120" value="20">
    </div>
    <button class="apply-count-btn" onclick="applyCustomCount()">適用</button>
    <!-- 选项随机开关（取消注释可启用） -->
    <!--
    <div class="random-toggle">
      <input type="checkbox" id="randomizeOptions" checked onchange="toggleRandomize()">
      <label for="randomizeOptions">選択肢をランダムに並べる</label>
    </div>
    -->
  </div>
</div>

<!-- 动态题目渲染容器 -->
<div class="main-container" id="mainContainer"></div>

<div class="score-summary" id="scoreSummary">
  <div class="score-bar">
    <span class="st">得点 <span class="sv" id="scoreValue">0</span> / <span id="scoreTotal">0</span></span>
    <span class="st">正答率 <span class="sv" id="rateValue">0%</span></span>
    <div class="reset-btn-group">
      <button class="reset-btn partial" onclick="resetOnlyAnswer()">解答クリア(問題そのまま)</button>
      <button class="reset-btn full" onclick="resetCurrent()">完全リセット(問題再抽選)</button>
    </div>
  </div>
</div>
<div class="footer">大学日本語Ⅲ 期末復習教材 · 第2冊 5〜10課</div>

<script>

_idx": 0}, {"id": 117, "qnum": 47, "stem": "今年はフランス語の勉強（ ）、生け花もやってみたい。", "options": ["に関して", "に対して", "に従って", "に加えて"], "answer": "D", "answer_idx": 3}, {"id": 118, "qnum": 48, "stem": "今日のお弁当には、焼き魚（ ）入っていれば高野豆腐も入っていてとても美味しかった。", "options": ["も", "に", "で", "へ"], "answer": "A", "answer_idx": 0}, {"id": 119, "qnum": 49, "stem": "中国語を母語（ ）人はその中国語検定試験を受験できないことになっている。", "options": ["とする", "となる", "になる", "でする"], "answer": "A", "answer_idx": 0}, {"id": 120, "qnum": 50, "stem": "マンションを借りたいが、いい物件が（ ）困っている。", "options": ["見つからない", "見つからずに", "見つからなくて", "見つからないで"], "answer": "C", "answer_idx": 2}].map(q => ({id: q.id, stem: q.stem, options: q.options, correct_index: q.answer_idx}));


// ========== 核心功能 ==========
function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getRandomQuestions(data, count) {
  const shuffled = shuffleArray(data);
  return shuffled.slice(0, Math.min(count, shuffled.length));
}

function shuffleOptions(q) {
  if (!q.options) return q;
  const opts = q.options.map((t, i) => ({ text: t, isCorrect: i === q.correct_index }));
  const shuffled = shuffleArray(opts);
  return {
    ...q,
    options: shuffled.map(o => o.text),
    correct_index: shuffled.findIndex(o => o.isCorrect)
  };
}

// 模块配置
const MODULES = {
  read: { data: RD_DATA, cls: 'm-read', accent: '#c13b2a', title: '下線部の単語の正しい読み方を選びなさい', subtitle: '大学日本語Ⅲ · 第2冊 5〜10課', label: '単語読み', mode: 'choice', shuffleOpts: true },
  kanji: { data: KJ_DATA, cls: 'm-kanji', accent: '#2d4a7a', title: '次の仮名の正しい漢字表記を選びなさい', subtitle: '大学日本語Ⅲ · 第2冊 5〜10課', label: '漢字', mode: 'choice', shuffleOpts: true },
  gairaigo: { data: GG_DATA, cls: 'm-gairaigo', accent: '#2d6e3a', title: '次の外来語を中国語に訳しなさい', subtitle: '大学日本語Ⅲ · 第2冊 5〜10課', label: '外来語', mode: 'input' },
  grammar: { data: GR_DATA, cls: 'm-grammar', accent: '#8b6e2e', title: '（ ）に入れるのに最も適当なものを選びなさい', subtitle: '大学日本語Ⅲ · 第2冊 5〜10課', label: '文法', mode: 'choice', shuffleOpts: false },
  combi: { data: null, cls: 'm-combi', accent: '#5a3a7a', title: '総合実力テスト', subtitle: '単語・漢字・外来語・文法の総合', label: '総合テスト', mode: 'mixed' }
};

let quizCount = { read: 15, kanji: 10, gairaigo: 10, grammar: 20 };
let stateMap = {};
let currentMod = 'read';
let globalRandomize = true; // 全局选项随机开关

function initState(mod) {
  if (!stateMap[mod]) {
    stateMap[mod] = { answered: {}, firstTry: {}, firstTryIdx: {}, inputs: {}, questions: [] };
  }
}

function shouldShuffle(mod) {
  return globalRandomize && MODULES[mod]?.shuffleOpts === true;
}

function generateRandomQuestions(mod) {
  const st = stateMap[mod];
  if (mod === 'combi') {
    const readQ = getRandomQuestions(RD_DATA, quizCount.read).map(q => {
      let newQ = { ...q, source: 'read' };
      if (shouldShuffle('read')) newQ = shuffleOptions(newQ);
      return newQ;
    });
    const kanjiQ = getRandomQuestions(KJ_DATA, quizCount.kanji).map(q => {
      let newQ = { ...q, source: 'kanji' };
      if (shouldShuffle('kanji')) newQ = shuffleOptions(newQ);
      return newQ;
    });
    const gaiQ = getRandomQuestions(GG_DATA, quizCount.gairaigo).map(q => ({ ...q, source: 'gairaigo' }));
    const grammarQ = getRandomQuestions(GR_DATA, quizCount.grammar).map(q => {
      let newQ = { ...q, source: 'grammar' };
      if (shouldShuffle('grammar')) newQ = shuffleOptions(newQ);
      return newQ;
    });
    st.questions = [...readQ, ...kanjiQ, ...gaiQ, ...grammarQ];
  } else {
    const config = MODULES[mod];
    let qs = getRandomQuestions(config.data, quizCount[mod]);
    if (shouldShuffle(mod)) {
      qs = qs.map(q => shuffleOptions(q));
    }
    st.questions = qs;
  }
}

function switchModule(mod) {
  currentMod = mod;
  initState(mod);
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-mod="${mod}"]`)?.classList.add('active');
  document.body.className = `mode-${mod}`;
  if (!stateMap[mod].questions.length) generateRandomQuestions(mod);
  renderModule(mod);
}

function renderModule(mod) {
  const container = document.getElementById('mainContainer');
  const st = stateMap[mod];
  const questions = st.questions || [];
  let html = `<div class="module-panel show m-${mod}">`;
  const config = MODULES[mod];
  html += `<div class="m-header">
    <span class="label">${config.label}</span>
    <h1>${config.title}</h1>
    <div class="subtitle">${config.subtitle}</div>
  </div>`;
  if (mod === 'gairaigo') {
    html += `<div class="gai-quick-bar">
      <button class="submit-all-btn" onclick="submitAllGairaigo()">すべて提出</button>
      <button class="reveal-all-btn" onclick="revealAllGairaigo()">すべて答えを見る</button>
      <span class="gai-quick-score" id="gaiQuickScore"></span>
    </div>`;
  }
  questions.forEach((q, idx) => {
    html += renderQuestion(q, idx, mod);
  });
  html += `</div>`;
  container.innerHTML = html;
  updateScoreBar(mod);
  if (mod === 'gairaigo') updateGaiQuickScore(mod);
}

function renderQuestion(q, idx, mod) {
  const st = stateMap[mod];
  const answered = st.answered[idx] || false;
  const selectedIdx = st.firstTryIdx[idx];
  const isGairaigo = q.accept !== undefined;
  let html = `<div class="q-card" id="q-${mod}-${idx}">`;
  
  // ---- 修改 badge 显示逻辑 ----
  let badgeText = '';
  if (mod === 'combi' && q.source) {
    if (q.source === 'read') {
      badgeText = q.word || '';          // 显示划线单词
    } else {
      badgeText = q.source;              // 显示来源（kanji/gairaigo/grammar）
    }
  } else if (mod === 'read') {
    badgeText = q.word || '';            // 显示单词
  } else {
    badgeText = MODULES[mod]?.label || ''; // 其他模块显示标签（如「漢字」「文法」）
  }
  // 如果 badgeText 过长，用 CSS 截断
  html += `<div class="q-num-row"><span class="q-num">${idx+1}</span><span class="q-badge" title="${badgeText}">${badgeText}</span></div>`;
  // ---------------------------------

  if (mod === 'read' || mod === 'kanji' || mod === 'grammar' || (mod === 'combi' && !isGairaigo)) {
    let stem = q.stem || q.sentence || q.word || q.kana || '';
    if (mod === 'read' || (mod === 'combi' && q.source === 'read')) {
      stem = q.sentence.replace(q.word, `<span class="hl">${q.word}</span>`);
    } else if (mod === 'kanji' || (mod === 'combi' && q.source === 'kanji')) {
      stem = `「${q.kana}」の漢字表記`;
    } else if (mod === 'grammar' || (mod === 'combi' && q.source === 'grammar')) {
      stem = q.stem;
    }
    html += `<div class="q-stem">${stem}</div>`;
    html += `<div class="q-prompt">${(mod==='grammar'||(mod==='combi'&&q.source==='grammar'))?'（ ）に入る適切なものを選びなさい':'正しいものを選びなさい'}</div>`;
    html += `<ul class="opts">`;
    q.options.forEach((opt, oi) => {
      let btnClass = 'opt-btn';
      let marker = String.fromCharCode(65 + oi);
      let disabled = '';
      if (answered) {
        disabled = 'disabled';
        if (selectedIdx === oi) {
          if (oi === q.correct_index) btnClass += ' correct-pick';
          else btnClass += ' wrong-pick';
        }
      }
      html += `<li><button class="${btnClass}" onclick="handleChoiceClick('${mod}', ${idx}, ${oi})" ${disabled}>
        <span class="opt-marker">${marker}</span> ${opt}
      </button></li>`;
    });
    html += `</ul>`;
    if (answered) {
      const isCorrect = st.firstTry[idx] === true;
      const feedbackText = isCorrect ? '✅ 正解！' : `❌ 不正解。正解は ${q.options[q.correct_index]} です。`;
      html += `<div class="feedback ${isCorrect ? 'ok' : 'ng'}">${feedbackText}</div>`;
    }
  } else {
    let stem = q.word || q.stem || '';
    html += `<div class="q-stem">「${stem}」の中国語訳を入力してください。</div>`;
    const inputVal = st.inputs[idx] || '';
    const disabled = answered ? 'disabled' : '';
    html += `<div class="input-row">
      <input class="answer-input" type="text" id="input-${mod}-${idx}" value="${inputVal}" placeholder="中国語で入力" ${disabled}>
      <button class="check-btn" onclick="handleInputSubmit('${mod}', ${idx})" ${disabled}>チェック</button>
    </div>`;
    if (answered) {
      const isCorrect = st.firstTry[idx] === true;
      const acceptStr = q.accept.join('、');
      const feedbackText = isCorrect ? '✅ 正解！' : `❌ 不正解。正解は「${acceptStr}」です。`;
      html += `<div class="feedback ${isCorrect ? 'ok' : 'ng'}">${feedbackText}</div>`;
    }
  }
  html += `</div>`;
  return html;
}

function handleChoiceClick(mod, qIndex, optionIndex) {
  const st = stateMap[mod];
  if (st.answered[qIndex]) return;
  const q = st.questions[qIndex];
  st.answered[qIndex] = true;
  st.firstTryIdx[qIndex] = optionIndex;
  st.firstTry[qIndex] = (optionIndex === q.correct_index);
  renderModule(mod);
}

function handleInputSubmit(mod, qIndex) {
  const st = stateMap[mod];
  if (st.answered[qIndex]) return;
  const q = st.questions[qIndex];
  const input = document.getElementById(`input-${mod}-${qIndex}`);
  if (!input) return;
  const val = input.value.trim();
  st.inputs[qIndex] = val;
  const accept = q.accept || [];
  const isCorrect = accept.some(a => a === val);
  st.answered[qIndex] = true;
  st.firstTry[qIndex] = isCorrect;
  renderModule(mod);
}

function updateScoreBar(mod) {
  const st = stateMap[mod];
  const questions = st.questions || [];
  const total = questions.length;
  let answered = 0, correct = 0;
  for (let i = 0; i < total; i++) {
    if (st.answered[i]) { answered++; if (st.firstTry[i] === true) correct++; }
  }
  document.getElementById('progText').textContent = `${answered} / ${total}`;
  const progBar = document.getElementById('progBar');
  progBar.style.width = total ? `${(answered/total)*100}%` : '0%';
  const config = MODULES[mod];
  progBar.style.backgroundColor = config.accent;
  document.getElementById('scoreValue').textContent = correct;
  document.getElementById('scoreTotal').textContent = total;
  const rate = answered ? Math.round((correct/answered)*100) : 0;
  document.getElementById('rateValue').textContent = `${rate}%`;
}

function resetCurrent() {
  const mod = currentMod;
  stateMap[mod] = { answered: {}, firstTry: {}, firstTryIdx: {}, inputs: {}, questions: [] };
  generateRandomQuestions(mod);
  renderModule(mod);
}

function resetOnlyAnswer() {
  const mod = currentMod;
  const st = stateMap[mod];
  const questions = st.questions || [];
  st.answered = {};
  st.firstTry = {};
  st.firstTryIdx = {};
  st.inputs = {};
  const newQuestions = questions.map(q => {
    const sourceMod = q.source || mod;
    if (q.options && shouldShuffle(sourceMod)) {
      return shuffleOptions(q);
    }
    return q;
  });
  st.questions = newQuestions;
  renderModule(mod);
}

function submitAllGairaigo() {
  const mod = 'gairaigo';
  const st = stateMap[mod];
  st.questions.forEach((q, idx) => {
    if (!st.answered[idx]) {
      const input = document.getElementById(`input-${mod}-${idx}`);
      if (input) {
        const val = input.value.trim();
        st.inputs[idx] = val;
        const accept = q.accept || [];
        st.answered[idx] = true;
        st.firstTry[idx] = accept.some(a => a === val);
      }
    }
  });
  renderModule(mod);
}

function revealAllGairaigo() {
  const mod = 'gairaigo';
  const st = stateMap[mod];
  st.questions.forEach((q, idx) => {
    if (!st.answered[idx]) {
      const input = document.getElementById(`input-${mod}-${idx}`);
      if (input) input.value = q.accept[0] || '';
      handleInputSubmit(mod, idx);
    }
  });
}

function updateGaiQuickScore(mod) {
  const st = stateMap[mod];
  const correct = st.questions.reduce((acc, _, idx) => acc + (st.answered[idx] && st.firstTry[idx] ? 1 : 0), 0);
  const el = document.getElementById('gaiQuickScore');
  if (el) el.textContent = `${correct}/${st.questions.length}`;
}

function applyCustomCount() {
  const read = parseInt(document.getElementById('cntRead').value) || 15;
  const kanji = parseInt(document.getElementById('cntKanji').value) || 10;
  const gai = parseInt(document.getElementById('cntGai').value) || 10;
  const gram = parseInt(document.getElementById('cntGram').value) || 20;
  quizCount.read = Math.min(Math.max(read, 1), RD_DATA.length);
  quizCount.kanji = Math.min(Math.max(kanji, 1), KJ_DATA.length);
  quizCount.gairaigo = Math.min(Math.max(gai, 1), GG_DATA.length);
  quizCount.grammar = Math.min(Math.max(gram, 1), GR_DATA.length);
  document.getElementById('cntRead').value = quizCount.read;
  document.getElementById('cntKanji').value = quizCount.kanji;
  document.getElementById('cntGai').value = quizCount.gairaigo;
  document.getElementById('cntGram').value = quizCount.grammar;
  const mod = currentMod;
  stateMap[mod] = { answered: {}, firstTry: {}, firstTryIdx: {}, inputs: {}, questions: [] };
  generateRandomQuestions(mod);
  renderModule(mod);
}

function toggleRandomize() {
  const checkbox = document.getElementById('randomizeOptions');
  globalRandomize = checkbox.checked;
  const mod = currentMod;
  stateMap[mod] = { answered: {}, firstTry: {}, firstTryIdx: {}, inputs: {}, questions: [] };
  generateRandomQuestions(mod);
  renderModule(mod);
}

window.onload = function() {
  for (let mod in MODULES) initState(mod);
  document.getElementById('cntRead').value = quizCount.read;
  document.getElementById('cntKanji').value = quizCount.kanji;
  document.getElementById('cntGai').value = quizCount.gairaigo;
  document.getElementById('cntGram').value = quizCount.grammar;
  // 如果启用随机开关，取消注释下面一行
  document.getElementById('randomizeOptions').checked = globalRandomize;
  switchModule('read');
};
</script>
